name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GTK3 + PyGObject
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 python3-pip python3-venv python3-dev \
            python3-gi python3-gi-cairo gir1.2-gtk-3.0 \
            libgtk-3-0 libgirepository-1.0-1 libcairo2 \
            xz-utils curl

      - name: Create venv with system PyGObject
        run: |
          python3 -m venv --system-site-packages .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install pyinstaller mutagen charset-normalizer

      - name: Fetch ffmpeg static
        run: |
          mkdir -p packaging/_ffmpeg
          curl -L -o ffmpeg.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xJf ffmpeg.tar.xz
          cp ffmpeg-master-latest-linux64-gpl/bin/ffmpeg packaging/_ffmpeg/
          cp ffmpeg-master-latest-linux64-gpl/bin/ffprobe packaging/_ffmpeg/
          chmod +x packaging/_ffmpeg/*

      - name: Build with PyInstaller
        run: |
          .venv/bin/pyinstaller packaging/cuetie.spec --noconfirm --clean

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          [ "$VERSION" = "$GITHUB_REF" ] && VERSION="dev"
          NAME="cuetie-${VERSION}-linux-x64"
          mv dist/cuetie "dist/${NAME}"
          tar -C dist -czf "dist/${NAME}.tar.gz" "${NAME}"
          echo "ARTIFACT=dist/${NAME}.tar.gz" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cuetie-linux
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: cuetie-linux
          path: dist

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
