user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  75s;
    server_tokens off;
    client_max_body_size 0;

    access_log /var/log/nginx/access.log;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream novnc_upstream {
        server 127.0.0.1:6080;
    }

    server {
        listen 8080 default_server;
        listen [::]:8080 default_server;
        server_name _;

        # Autoconnect landing: redirect / to noVNC's lightweight viewer
        # (vnc_lite.html always autoconnects on load). path=websockify tells
        # noVNC to open ws://<host>/websockify.
        location = / {
            return 302 /vnc_lite.html?path=websockify&resize=remote;
        }

        # WebSocket endpoint — must come before catch-all proxy_pass.
        location /websockify {
            proxy_pass http://novnc_upstream/websockify;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }

        # noVNC static assets (vnc.html, app/, core/, vendor/) served by websockify.
        location / {
            proxy_pass http://novnc_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_buffering off;
        }
    }
}
